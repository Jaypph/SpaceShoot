<!DOCTYPE html>
<html lang="en">
<head>
	<title>SpaceShoot</title>

	<script type="text/javascript" src="xorshift.js"></script>
	<script type="text/javascript" src="Game.js"></script>
	<script type="text/javascript" src="lib/easeljs-0.7.1.min.js"></script>
	<script type="text/javascript" src="lib/preloadjs-0.4.1.min.js"></script>
	<script type="text/javascript" src="createjs_game.js"></script>

	<style>
		body {
			margin: 0;
			font-family: Arial, sans-serif;
			background: radial-gradient(circle at top, #111 0%, #000 70%);
			color: #fff;
			text-align: center;
		}

		#header {
			padding: 20px;
			background: rgba(255, 255, 255, 0.05);
			border-bottom: 1px solid rgba(255, 255, 255, 0.1);
		}

		#header h1 {
			margin: 0;
			font-size: 32px;
			letter-spacing: 2px;
			color: #00e5ff;
			text-shadow: 0 0 10px #00e5ff;
		}

		canvas {
			margin-top: 20px;
			border: 2px solid rgba(0, 229, 255, 0.4);
			box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
			background: #000;
		}

		#controls {
			margin-top: 20px;
			padding: 10px;
		}

		button, input[type="button"] {
			background: #111;
			color: #00e5ff;
			border: 1px solid #00e5ff;
			padding: 8px 12px;
			margin: 5px;
			cursor: pointer;
			transition: 0.2s;
			border-radius: 4px;
		}

		button:hover, input[type="button"]:hover {
			background: #00e5ff;
			color: #000;
			box-shadow: 0 0 10px #00e5ff;
		}

		#saveText {
			width: 60%;
			padding: 8px;
			background: #111;
			border: 1px solid #333;
			color: #0f0;
			margin-top: 10px;
		}

		hr {
			border: 0;
			height: 1px;
			background: rgba(255,255,255,0.1);
			margin: 20px auto;
			width: 60%;
		}
	</style>
</head>

<body onload="init()">

	<div id="header">
		<h1>SpaceShoot</h1>
	</div>

	<canvas id="scratch" width="400" height="400"></canvas>

	<div id="text"></div>
	<div id="savetext"></div>

	<div id="controls">
		<input type="button" value="Pause Game" onclick="togglePause()">
		<br><br>

		<input type="button" value="get state"
			onclick="document.getElementById('saveText').value = save()">

		<input type="button" value="set state"
			onclick="load(document.getElementById('saveText').value)">

		<input type="button" value="reset" onclick="reset()">

		<br><br>

		Serialized game text:<br>
		<input id="saveText" type="text" value="">
	</div>

	<hr>
	<hr>

</body>
</html>
